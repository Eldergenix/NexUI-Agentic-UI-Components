name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build registry JSON manifests
        run: pnpm registry:build

      - name: Verify registry output
        run: |
          ITEM_COUNT="$(node -p "require('./public/r/registry.json').items.length")"
          JSON_COUNT="$(ls public/r/*.json | wc -l | tr -d ' ')"
          echo "Registry items: $ITEM_COUNT"
          echo "JSON files: $JSON_COUNT"
          if [ "$ITEM_COUNT" -lt 50 ]; then
            echo "::error::registry.json has only $ITEM_COUNT items — expected at least 50"
            exit 1
          fi

      - name: Lint
        run: pnpm lint
        continue-on-error: true
